<!DOCTYPE html>
<html lang="zh-CN">
<head>

            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-radius: 12px;
        }

        body {

            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 600px;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            font-weight: bold;
        }

        main {
            padding: 30px;
            flex-grow: 1;
            overflow-y: auto;
        }

        /* 首页选卷样式 */
        .home-title {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        
        .exam-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .exam-card {
            padding: 20px;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .exam-card:hover {
            border-color: var(--primary-color);
            background-color: #f9fbf9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.1);
        }

        .exam-title {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* 考场样式 */
        .section-title {
            font-size: 1.5rem;
            color: var(--primary-color);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .question-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-label:hover {
            background: #e8f5e9;
            border-color: var(--primary-color);
        }

        input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        .action-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .action-btn:hover {
            background-color: #45a049;
        }

        .action-btn.recording {
            background-color: #f44336;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(244, 67, 54, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }

            padding: 15px 20px;
            background: #f1f1f1;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #ddd;
        }

            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #ddd;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-btn.primary {
            background: var(--primary-color);
            color: white;
            margin-left: auto;
        }

            margin-top: 15px;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 6px;
            min-height: 40px;
            color: #1565c0;
            font-style: italic;
        }
    </style>
</head>

async function gradeSpokenEnglish(studentText) {
    console.log("🎙️ 学生回答文本:", studentText);
    console.log("⏳ 正在呼叫 AI 考官打分...");

    const promptContext = `
    你现在是一位专业的少儿英语口语考官。
    请根据以下标准，对学生的回答进行打分并给出友好的中文鼓励反馈。
    
    【题目】: Do you like English class?
    【满分】: 10分
    【评分标准】: 
    1. 准确作出肯定回答（包含 yes, yeah, love 等意图）：+5分
    2. 能说明喜欢的理由（提到 teacher, fun, play, friend 等）：+3分
    3. 文本连贯且无明显语法断裂（模拟发音清晰）：+2分

    请严格返回 JSON 格式数据：{"score": 数字, "feedback": "中文评价"}
    `;

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: "glm-4-flash", // 🚀 使用免费且极速的 Flash 模型
                messages: [
                    { role: "system", content: promptContext },
                    { role: "user", content: `学生的回答是: ${studentText}` }
                ]
            })
        });

        const data = await response.json();
        
        // 解析 AI 返回的 JSON 结果
        const aiResult = JSON.parse(data.choices[0].message.content);
        console.log("✅ AI 考官打分结果:", aiResult);
        
        // 🚧 这里可以对接你的前端 UI：
        // document.getElementById('score-display').innerText = aiResult.score;
        // document.getElementById('feedback-display').innerText = aiResult.feedback;

        return aiResult;

        console.error("❌ 调用 AI 接口失败:", error);
        alert("网络开小差啦，打分失败请重试！");
    }
}

    let currentExamId = null;

        recognition = new SpeechRecognition();

    // ================= 3. 核心功能实现 =================

    function renderHome() {
        const mainEl = document.getElementById('main-content');
        document.getElementById('header-title').innerText = "幼儿英语模考系统";
        document.getElementById('exam-status').style.display = 'none';
        document.getElementById('exam-footer').style.display = 'none';

        let html = `
            <h2 class="home-title">请选择模拟考卷</h2>
            <div class="exam-list">
        `;
        
        for (const key in allExams) {
            html += `
                <div class="exam-card" onclick="startExam('${key}')">
                    <span class="exam-title">📄 ${allExams[key].title}</span>
                    <button class="action-btn">进入</button>
                </div>
            `;
        }
        
        html += `</div>`;
        mainEl.innerHTML = html;
    }

    function startExam(examId) {
        currentExamId = examId;
        examData = allExams[examId];
        currentIndex = 0;
        userAnswers = {};
        timeRemaining = examData.totalTime;

        document.getElementById('header-title').innerText = examData.title;
        document.getElementById('exam-status').style.display = 'flex';
        document.getElementById('exam-footer').style.display = 'flex';

        renderQuestion();
        startTimer();
    }

    function playAudio(text, rate = 0.8) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = rate;
            window.speechSynthesis.speak(utterance);
        } else {
            alert("当前浏览器不支持语音合成，请使用 Chrome 或 Edge。");
        }
    }

    function toggleRecording(btn) {
        if (!recognition) {
            alert("当前浏览器不支持语音识别，请使用 Chrome。");
            return;
        }

        const resultDiv = document.getElementById('speech-result');

        if (btn.classList.contains('recording')) {
            recognition.stop();
            btn.classList.remove('recording');
            btn.innerText = '🎤 开始录音';
        } else {
            resultDiv.innerText = "正在聆听...";
            btn.classList.add('recording');
            btn.innerText = '⏹ 停止录音';
            
            recognition.start();

            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }
                if (finalTranscript) {
                    resultDiv.innerText = "AI识别结果: " + finalTranscript;
                    userAnswers[currentIndex] = finalTranscript;
                    gradeSpokenEnglish(finalTranscript);
                }
            };

            recognition.onend = () => {
                btn.classList.remove('recording');
                btn.innerText = '🎤 重新录音';
            };
        }
    }
    function renderQuestion() {
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        if (recognition) recognition.stop();

        const q = examData.questions[currentIndex];
        const mainEl = document.getElementById('main-content');
        const progressEl = document.getElementById('progress');

function triggerDraw() {
    // 1. 获取当前这道题的数据
    let q = examData.questions[currentIndex];
    
    // 2. 随机转盘：在 3 个主题里随机抽一个
    let luckyIndex = Math.floor(Math.random() * q.topics.length);
    let selectedTopic = q.topics[luckyIndex];
    
    // 3. 找到网页上装卡片的那个大盒子
    let box = document.querySelector('.spoken-draw-box');
    if(!box) return;
    
    // 4. 瞬间重写界面：把抽中的题目、配图和录音按钮显示出来！
    box.innerHTML = `
        <div style="background: #E6F7FF; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            🎉 恭喜你抽中主题: <strong style="font-size: 20px; color: #4A90E2;">${selectedTopic.title}</strong>
        </div>
        
        <div style="margin-bottom: 20px;">
            <img src="images/${selectedTopic.image}" style="max-width: 250px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);" alt="口语提示图" />
        </div>
        
        <div>
            <button class="action-btn record-btn" style="user-select: none;" 
                onmousedown="startRecording(event, this)" 
                onmouseup="stopRecording(event, this)"

                ontouchstart="startRecording(event, this)" 
                ontouchend="stopRecording(event, this)">
                🎤 长按开始说话，松开结束
            </button>
            <div id="speech-result" style="margin-top:15px; color:#666; font-weight: bold;">等待录音...</div>
        </div>
    `;
    
    // 5. 悄悄把当前抽中的主题存下来，等会儿喂给大模型考官
    window.currentActiveTopic = selectedTopic;
}

async function scoreWithAI(topic, userSpeech, btnElement) {
    if (!userSpeech || userSpeech.trim() === '') {
        alert('小朋友还没有留下录音文本哦！'); 
        return;
    }
    
    let resultDiv = btnElement.nextElementSibling || document.querySelector('.ai-result-box');
    if (!resultDiv) {
        resultDiv = document.createElement('div');
        resultDiv.className = 'ai-result-box';
        btnElement.parentNode.appendChild(resultDiv);
    }

    btnElement.innerText = "⏳ AI 考官正在认真思考中...";
    btnElement.disabled = true;
    btnElement.style.background = "#9e9e9e";
    resultDiv.style.display = "block";
    resultDiv.innerHTML = "<div style='padding:15px; text-align:center;'><em>📡 正在连接大模型神经元...</em></div>";

    const prompt = `你是一个温柔、鼓励型的少儿英语口语考官。
考生抽到的题目是：【${topic}】
考生的实际录音识别文本是：【${userSpeech}】

function startRecording(e, btnElement) {
    if(e) e.preventDefault(); 
    btnElement.style.background = "#f44336"; 
    btnElement.style.color = "white";
    btnElement.innerText = "🎙️ 正在录音... (松开结束)";

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US'; 
        recognition.continuous = true; 
        recognition.interimResults = false; 
        
        recognition.onresult = function(event) {
            let finalTranscript = '';
            for (let i = 0; i < event.results.length; i++) {
                finalTranscript += event.results[i][0].transcript;
            }
            userAnswers[currentIndex] = finalTranscript;
            let resultDiv = document.querySelector('div[id^="speech-result"]') || btnElement.nextElementSibling;
            if(resultDiv) {
                resultDiv.innerText = '✅ 已录音: ' + finalTranscript;
                resultDiv.style.color = "#4caf50";
                resultDiv.style.fontWeight = "bold";
            }
        };
        recognition.start();
    }
}

function stopRecording(e, btnElement) {
    if(e) e.preventDefault();
    btnElement.style.background = "#4caf50"; 
    btnElement.style.color = "white";
    btnElement.innerText = "🎤 长按开始说话，松开结束";
    if (recognition) recognition.stop();
}
